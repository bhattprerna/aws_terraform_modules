name: Terraform apply
# Runs the workflow on the below events:
# 1. On push event to develop branch
# 2. On push event to main branch

on:
  workflow_call:
    # Required inputs
    inputs:
      env:
        description: "stage | dev | prod | dr"
        required: true
        type: string
      role-to-assume:
        description: "AWS Role arn"
        type: string
        required: true
      role-session-name:
        description: "AWS Role session name"
        type: string
        required: true
      aws-region-name:
        description: "AWS region name"
        type: string
        required: true
   
jobs:
  # This job runs Terraform Plan
  plan:
    name: Plan (${{ inputs.env }})
    uses: bhattprerna/aws_terraform_modules/.github/workflows/terraform-plan.yaml@v1.0.0
    with:
      env: ${{ inputs.env }}
      role-to-assume: ${{ inputs.role-to-assume }}
      role-session-name: ${{ inputs.role-session-name }}
      aws-region-name: ${{ inputs.aws-region-name }}

  apply:
    # This job runs Terraform Apply
    name: Apply (${{ inputs.env }})
    environment: ${{ inputs.env }}
    runs-on: ubuntu-latest
    needs: [plan]
    steps:
      # Checkout the project
      - name: Checkout Project
        uses: actions/checkout@v4
    
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Logging into AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws-region-name }}
          role-to-assume: ${{ inputs.role-to-assume }}
          role-session-name: ${{ inputs.role-session-name }}

      # Install Terraform CLI
      - name: Terraform install
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.2"

      # Intialiazation of Terraform project
      - name: Terraform init
        run: make ENV=${{ inputs.env }} terraform/init

      # Download the Terraform plan
      - name: Restore Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform_${{ github.sha }}_${{ inputs.env }}.plan
          path: infra/terraform

      # Applying Terraform
      - name: Terraform apply
        run: make ENV=${{ inputs.env }} TF_CMD_ARGS='-auto-approve terraform_${{ github.sha }}_${{ inputs.env }}.plan' terraform/apply